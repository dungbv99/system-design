version: '3.9'

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: livestreaming
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Media server: RTMP ingest + HLS output ────────────────────────────────
  # Streamers push to: rtmp://localhost:1935/live/{streamKey}
  # SRS calls stream-api hooks to validate the stream key.

  srs:
    image: ossrs/srs:5
    ports:
      - "1935:1935"
      - "8085:8080"
    volumes:
      - ./srs/srs.conf:/usr/local/srs/conf/srs.conf
      - hls_data:/data/hls
    command: ./objs/srs -c conf/srs.conf
    depends_on:
      - stream-api

  # ── HLS segment server ────────────────────────────────────────────────────
  # Viewers pull: http://localhost:8084/live/{streamKey}/index.m3u8

  nginx-hls:
    image: nginx:alpine
    ports:
      - "8084:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - hls_data:/data/hls:ro

  # ── Go services ───────────────────────────────────────────────────────────

  stream-api:
    build:
      context: stream-api
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: livestreaming
      REDIS_ADDR: redis:6379
      JWT_SECRET: "livestreaming-super-secret-key-must-be-at-least-256-bits-long-for-hs256"
      HLS_BASE_URL: "http://localhost:8084"
      PORT: "8082"

  chat-service:
    build:
      context: chat-service
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      PORT: "8083"
      JWT_SECRET: "livestreaming-super-secret-key-must-be-at-least-256-bits-long-for-hs256"

  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: frontend
    ports:
      - "3000:3000"    # http://localhost:3000
    depends_on:
      - stream-api
      - chat-service

volumes:
  postgres_data:
  hls_data:
