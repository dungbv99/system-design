server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to stream-api (Vite's dev proxy doesn't exist in production builds)
    location /api {
        proxy_pass http://stream-api:8082/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA: redirect all unknown paths to index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }
}
