listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {

    hls {
        enabled         on;
        hls_path        /data/hls;
        hls_fragment    2;      # 2-second segments → ~4s latency
        hls_window      10;     # keep last 10 seconds in playlist
    }

    # SRS calls these URLs when a stream starts / stops.
    # stream-api validates the stream key and marks the channel live.
    # A non-2xx response causes SRS to reject the publisher (invalid key).
    http_hooks {
        enabled         on;
        on_publish      http://stream-api:8082/internal/stream/start;
        on_unpublish    http://stream-api:8082/internal/stream/end;
    }
}
