<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Scheduler Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: [
        'bg-yellow-900','text-yellow-300',
        'bg-purple-900','text-purple-300',
        'bg-blue-900','text-blue-300',
        'bg-cyan-900','text-cyan-300',
        'bg-green-900','text-green-300',
        'bg-red-900','text-red-300',
        'bg-gray-700','text-red-400','text-gray-400',
        'bg-red-800','text-red-200',
        'bg-orange-800','text-orange-200',
        'bg-blue-800','text-blue-200',
      ]
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn        { @apply px-3 py-1.5 rounded text-xs font-medium transition-colors cursor-pointer; }
      .btn-primary { @apply bg-blue-600 hover:bg-blue-500 text-white; }
      .btn-danger  { @apply bg-red-800 hover:bg-red-700 text-white; }
      .btn-ghost   { @apply bg-gray-700 hover:bg-gray-600 text-gray-200; }
      .badge       { @apply px-2 py-0.5 rounded-full text-xs font-semibold whitespace-nowrap; }
      .card        { @apply bg-gray-800 rounded-lg p-3; }
      .tab-btn     { @apply px-5 py-3 text-sm font-medium border-b-2 transition-colors cursor-pointer; }
      .tab-btn.active           { @apply border-blue-500 text-blue-400; }
      .tab-btn:not(.active)     { @apply border-transparent text-gray-400 hover:text-gray-200; }
      .modal-overlay { @apply fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4; }
      .modal-box     { @apply bg-gray-800 rounded-xl p-6 w-full shadow-2xl; }
      .field-input   { @apply bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm text-gray-100 w-full focus:outline-none focus:border-blue-500; }
      .field-label   { @apply block text-xs text-gray-400 mb-1; }
      th { @apply px-4 py-2.5 text-left text-xs font-semibold text-gray-400 uppercase tracking-wider whitespace-nowrap; }
      td { @apply px-4 py-2.5 whitespace-nowrap; }
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen text-sm" style="font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace">

  <!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
  <header class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between sticky top-0 z-20">
    <div class="flex items-center gap-3">
      <span class="text-blue-400 font-bold text-base">⚡ Job Scheduler</span>
      <span id="health-badge" class="badge bg-gray-700 text-gray-400">connecting…</span>
    </div>
    <div class="flex items-center gap-4 text-xs text-gray-400">
      <span>Updated <span id="last-updated" class="text-gray-300">—</span></span>
      <span>Refresh in <span id="countdown" class="text-blue-400 font-bold tabular-nums w-3 inline-block">5</span>s</span>
      <button id="refresh-now" class="btn btn-ghost py-1">↺ Now</button>
    </div>
  </header>

  <!-- ── STATS BAR ──────────────────────────────────────────────────────────── -->
  <div id="stats-bar" class="px-6 py-3 flex gap-3 flex-wrap border-b border-gray-700 bg-gray-850">
    <!-- populated by JS -->
  </div>

  <!-- ── TAB BAR ────────────────────────────────────────────────────────────── -->
  <div class="px-6 flex border-b border-gray-700 bg-gray-900 sticky top-14 z-10">
    <button class="tab-btn active" data-tab="jobs">Jobs</button>
    <button class="tab-btn" data-tab="workflows">Workflows</button>
    <button class="tab-btn" data-tab="workers">Workers</button>
  </div>

  <!-- ── TAB PANELS ─────────────────────────────────────────────────────────── -->
  <main class="px-6 py-5 max-w-screen-2xl mx-auto">

    <!-- JOBS PANEL -->
    <div id="panel-jobs" class="tab-panel">
      <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
        <select id="job-status-filter" class="field-input w-44">
          <option value="">All statuses</option>
          <option value="PENDING">PENDING</option>
          <option value="WAITING">WAITING</option>
          <option value="ASSIGNED">ASSIGNED</option>
          <option value="RUNNING">RUNNING</option>
          <option value="COMPLETED">COMPLETED</option>
          <option value="FAILED">FAILED</option>
          <option value="DEAD">DEAD</option>
          <option value="CANCELLED">CANCELLED</option>
        </select>
        <button id="open-submit-job" class="btn btn-primary">+ Submit Job</button>
      </div>
      <div class="overflow-x-auto rounded-lg border border-gray-700">
        <table class="w-full">
          <thead class="bg-gray-800">
            <tr>
              <th>Name</th>
              <th>ID</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Worker</th>
              <th>Retries</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="jobs-tbody">
            <tr><td colspan="8" class="px-4 py-10 text-center text-gray-500">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- WORKFLOWS PANEL -->
    <div id="panel-workflows" class="tab-panel hidden">
      <div class="flex justify-end mb-4">
        <button id="open-submit-workflow" class="btn btn-primary">+ Submit Workflow</button>
      </div>
      <div class="overflow-x-auto rounded-lg border border-gray-700">
        <table class="w-full">
          <thead class="bg-gray-800">
            <tr>
              <th>Name</th>
              <th>ID</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="workflows-tbody">
            <tr><td colspan="5" class="px-4 py-10 text-center text-gray-500">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- WORKERS PANEL -->
    <div id="panel-workers" class="tab-panel hidden">
      <div class="overflow-x-auto rounded-lg border border-gray-700">
        <table class="w-full">
          <thead class="bg-gray-800">
            <tr>
              <th>Worker ID</th>
              <th>Status</th>
              <th>Total Slots</th>
              <th>Slots Used</th>
              <th>Last Heartbeat</th>
            </tr>
          </thead>
          <tbody id="workers-tbody">
            <tr><td colspan="5" class="px-4 py-10 text-center text-gray-500">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- ── MODAL: Submit Job ──────────────────────────────────────────────────── -->
  <div id="submit-job-modal" class="modal-overlay hidden">
    <div class="modal-box max-w-md">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-bold text-base">Submit Job</h2>
        <button class="modal-close text-gray-400 hover:text-white" data-modal="submit-job-modal">✕</button>
      </div>
      <form id="submit-job-form" class="space-y-4">
        <div>
          <label class="field-label">Name *</label>
          <input class="field-input" name="name" type="text" required placeholder="e.g. process-report" />
        </div>
        <div>
          <label class="field-label">Payload (JSON)</label>
          <textarea class="field-input" name="payload" rows="3" placeholder='{"key": "value"}'></textarea>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="field-label">Priority</label>
            <select class="field-input" name="priority">
              <option value="0">0 — Critical</option>
              <option value="1">1 — High</option>
              <option value="2" selected>2 — Normal</option>
              <option value="3">3 — Background</option>
            </select>
          </div>
          <div>
            <label class="field-label">Max Retries</label>
            <input class="field-input" name="max_retries" type="number" min="0" max="10" value="3" />
          </div>
        </div>
        <div id="submit-job-error" class="text-red-400 text-xs hidden"></div>
        <div class="flex justify-end gap-2 pt-1">
          <button type="button" class="btn btn-ghost modal-close" data-modal="submit-job-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── MODAL: Submit Workflow ─────────────────────────────────────────────── -->
  <div id="submit-workflow-modal" class="modal-overlay hidden">
    <div class="modal-box max-w-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-bold text-base">Submit Workflow (DAG)</h2>
        <button class="modal-close text-gray-400 hover:text-white" data-modal="submit-workflow-modal">✕</button>
      </div>
      <form id="submit-workflow-form" class="space-y-4">
        <div>
          <label class="field-label">Workflow Name *</label>
          <input class="field-input" name="workflow_name" type="text" required placeholder="e.g. nightly-pipeline" />
        </div>
        <div>
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs font-semibold text-gray-300">Jobs</span>
            <button type="button" id="add-wf-job" class="btn btn-ghost py-1">+ Add Job</button>
          </div>
          <div id="wf-jobs-list" class="space-y-3"></div>
        </div>
        <div id="submit-workflow-error" class="text-red-400 text-xs hidden"></div>
        <div class="flex justify-end gap-2 pt-1">
          <button type="button" class="btn btn-ghost modal-close" data-modal="submit-workflow-modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Submit Workflow</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── MODAL: Job Detail ──────────────────────────────────────────────────── -->
  <div id="job-detail-modal" class="modal-overlay hidden">
    <div class="modal-box max-w-xl">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-bold text-base">Job Detail</h2>
        <button class="modal-close text-gray-400 hover:text-white" data-modal="job-detail-modal">✕</button>
      </div>
      <div id="job-detail-content" class="space-y-3 text-xs"></div>
      <div class="flex justify-end pt-4">
        <button class="btn btn-ghost modal-close" data-modal="job-detail-modal">Close</button>
      </div>
    </div>
  </div>

  <!-- ── MODAL: Workflow Detail ─────────────────────────────────────────────── -->
  <div id="workflow-detail-modal" class="modal-overlay hidden">
    <div class="modal-box max-w-2xl max-h-[90vh] overflow-y-auto">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-bold text-base">Workflow Detail</h2>
        <button class="modal-close text-gray-400 hover:text-white" data-modal="workflow-detail-modal">✕</button>
      </div>
      <div id="workflow-detail-content" class="space-y-3 text-xs"></div>
      <div class="flex justify-end pt-4">
        <button class="btn btn-ghost modal-close" data-modal="workflow-detail-modal">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ── Constants ───────────────────────────────────────────────────────────────

    const STATUS_COLORS = {
      PENDING:   'bg-yellow-900 text-yellow-300',
      WAITING:   'bg-purple-900 text-purple-300',
      ASSIGNED:  'bg-blue-900 text-blue-300',
      RUNNING:   'bg-cyan-900 text-cyan-300',
      COMPLETED: 'bg-green-900 text-green-300',
      FAILED:    'bg-red-900 text-red-300',
      DEAD:      'bg-gray-700 text-red-400',
      CANCELLED: 'bg-gray-700 text-gray-400',
    };

    const PRIORITY_META = {
      0: { label: 'Critical', color: 'bg-red-800 text-red-200' },
      1: { label: 'High',     color: 'bg-orange-800 text-orange-200' },
      2: { label: 'Normal',   color: 'bg-blue-900 text-blue-200' },
      3: { label: 'BG',       color: 'bg-gray-700 text-gray-400' },
    };

    const STAT_STATUSES = ['PENDING', 'WAITING', 'RUNNING', 'COMPLETED', 'FAILED', 'DEAD', 'CANCELLED'];

    const STAT_COLORS = {
      PENDING:   'text-yellow-400',
      WAITING:   'text-purple-400',
      RUNNING:   'text-cyan-400',
      COMPLETED: 'text-green-400',
      FAILED:    'text-red-400',
      DEAD:      'text-red-500',
      CANCELLED: 'text-gray-400',
    };

    // ── Helpers ─────────────────────────────────────────────────────────────────

    function statusBadge(s) {
      const cls = STATUS_COLORS[s] || 'bg-gray-700 text-gray-300';
      return `<span class="badge ${cls}">${s}</span>`;
    }

    function priorityBadge(p) {
      const meta = PRIORITY_META[p] ?? { label: String(p), color: 'bg-gray-700 text-gray-300' };
      return `<span class="badge ${meta.color}">${meta.label}</span>`;
    }

    function shortID(id) {
      if (!id) return '—';
      return `<span title="${id}" class="cursor-help text-gray-400 font-mono">${id.slice(0, 8)}…</span>`;
    }

    function fmtDate(t) {
      if (!t) return '—';
      return new Date(t).toLocaleString();
    }

    function ago(t) {
      if (!t) return '—';
      const s = Math.floor((Date.now() - new Date(t)) / 1000);
      if (s < 5)    return 'just now';
      if (s < 60)   return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      return `${Math.floor(s / 3600)}h ago`;
    }

    // ── State ───────────────────────────────────────────────────────────────────

    const state = { jobs: [], workflows: [], workers: [], jobFilter: '' };

    // ── API ─────────────────────────────────────────────────────────────────────

    async function apiFetch(path, opts = {}) {
      const r = await fetch(path, opts);
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        throw new Error(body.error || r.statusText);
      }
      return r.json();
    }

    async function fetchAll() {
      const jobPath = state.jobFilter ? `/api/jobs?status=${state.jobFilter}` : '/api/jobs';
      const [jobs, workflows, workers] = await Promise.all([
        apiFetch(jobPath),
        apiFetch('/api/workflows'),
        apiFetch('/api/workers'),
      ]);
      state.jobs      = jobs      ?? [];
      state.workflows = workflows ?? [];
      state.workers   = workers   ?? [];
      document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
      const hb = document.getElementById('health-badge');
      hb.textContent  = 'healthy';
      hb.className    = 'badge bg-green-900 text-green-300';
    }

    // ── Render: Stats ───────────────────────────────────────────────────────────

    function renderStats() {
      const counts = {};
      for (const j of state.jobs) counts[j.status] = (counts[j.status] || 0) + 1;

      const totalSlots = state.workers.reduce((s, w) => s + parseInt(w.total_slots || 0), 0);
      const availSlots = state.workers.reduce((s, w) => s + parseInt(w.available_slots || 0), 0);

      document.getElementById('stats-bar').innerHTML = [
        ...STAT_STATUSES.map(s => `
          <div class="card flex-1 min-w-[72px] text-center py-2 px-1">
            <div class="text-xl font-bold tabular-nums ${STAT_COLORS[s] || 'text-gray-300'}">${counts[s] || 0}</div>
            <div class="text-xs text-gray-500 mt-0.5">${s}</div>
          </div>`),
        `<div class="card flex-1 min-w-[72px] text-center py-2 px-1">
          <div class="text-xl font-bold tabular-nums text-blue-400">${state.workers.length}</div>
          <div class="text-xs text-gray-500 mt-0.5">Workers</div>
        </div>`,
        `<div class="card flex-1 min-w-[80px] text-center py-2 px-1">
          <div class="text-xl font-bold tabular-nums text-indigo-400">${totalSlots - availSlots}/${totalSlots}</div>
          <div class="text-xs text-gray-500 mt-0.5">Slots used</div>
        </div>`,
      ].join('');
    }

    // ── Render: Jobs ─────────────────────────────────────────────────────────────

    function renderJobs() {
      const tbody = document.getElementById('jobs-tbody');
      if (!state.jobs.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="px-4 py-10 text-center text-gray-500">No jobs found</td></tr>`;
        return;
      }
      tbody.innerHTML = state.jobs.map(j => `
        <tr class="border-t border-gray-700/60 hover:bg-gray-800/60 transition-colors">
          <td class="max-w-[160px]">
            <span class="block truncate text-gray-200 font-medium" title="${esc(j.name)}">${esc(j.name)}</span>
          </td>
          <td>${shortID(j.id)}</td>
          <td>${priorityBadge(j.priority)}</td>
          <td>${statusBadge(j.status)}</td>
          <td class="text-gray-400">${j.worker_id ? shortID(j.worker_id) : '—'}</td>
          <td class="text-gray-400 tabular-nums">${j.retry_count}/${j.max_retries}</td>
          <td class="text-gray-500" title="${fmtDate(j.created_at)}">${ago(j.created_at)}</td>
          <td>
            <div class="flex items-center gap-1">
              <button class="btn btn-ghost py-0.5" onclick="showJobDetail('${j.id}')">Detail</button>
              ${['PENDING','WAITING','ASSIGNED'].includes(j.status)
                ? `<button class="btn btn-danger py-0.5" onclick="cancelJob('${j.id}')">Cancel</button>`
                : ''}
            </div>
          </td>
        </tr>
      `).join('');
    }

    // ── Render: Workflows ────────────────────────────────────────────────────────

    function renderWorkflows() {
      const tbody = document.getElementById('workflows-tbody');
      if (!state.workflows.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-10 text-center text-gray-500">No workflows found</td></tr>`;
        return;
      }
      tbody.innerHTML = state.workflows.map(w => `
        <tr class="border-t border-gray-700/60 hover:bg-gray-800/60 transition-colors">
          <td class="text-gray-200 font-medium">${esc(w.name)}</td>
          <td>${shortID(w.id)}</td>
          <td>${statusBadge(w.status)}</td>
          <td class="text-gray-500" title="${fmtDate(w.created_at)}">${ago(w.created_at)}</td>
          <td>
            <div class="flex items-center gap-1">
              <button class="btn btn-ghost py-0.5" onclick="showWorkflowDetail('${w.id}')">Detail</button>
              ${w.status === 'RUNNING'
                ? `<button class="btn btn-danger py-0.5" onclick="cancelWorkflow('${w.id}')">Cancel</button>`
                : ''}
            </div>
          </td>
        </tr>
      `).join('');
    }

    // ── Render: Workers ──────────────────────────────────────────────────────────

    function renderWorkers() {
      const tbody = document.getElementById('workers-tbody');
      if (!state.workers.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-10 text-center text-gray-500">No active workers</td></tr>`;
        return;
      }
      tbody.innerHTML = state.workers.map(w => {
        const total = parseInt(w.total_slots || 0);
        const avail = parseInt(w.available_slots || 0);
        const used  = total - avail;
        const pct   = total ? Math.round(used / total * 100) : 0;
        const alive = w.status === 'alive';
        return `
          <tr class="border-t border-gray-700/60 hover:bg-gray-800/60 transition-colors">
            <td class="text-gray-200 font-medium">${esc(w.id || '—')}</td>
            <td>${alive
              ? '<span class="badge bg-green-900 text-green-300">alive</span>'
              : '<span class="badge bg-gray-700 text-gray-400">offline</span>'}</td>
            <td class="text-gray-300 tabular-nums">${total}</td>
            <td>
              <div class="flex items-center gap-2">
                <div class="w-24 bg-gray-700 rounded-full h-1.5 overflow-hidden">
                  <div class="h-1.5 rounded-full ${pct > 80 ? 'bg-red-500' : pct > 50 ? 'bg-yellow-500' : 'bg-blue-500'} transition-all"
                       style="width:${pct}%"></div>
                </div>
                <span class="text-gray-300 tabular-nums text-xs">${used}/${total}</span>
              </div>
            </td>
            <td class="text-gray-500">${ago(w.last_heartbeat)}</td>
          </tr>
        `;
      }).join('');
    }

    function renderAll() {
      renderStats();
      renderJobs();
      renderWorkflows();
      renderWorkers();
    }

    // ── XSS helper ───────────────────────────────────────────────────────────────

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Actions ──────────────────────────────────────────────────────────────────

    async function cancelJob(id) {
      if (!confirm('Cancel this job?')) return;
      try {
        await apiFetch(`/api/jobs/${id}`, { method: 'DELETE' });
        await refresh();
      } catch (e) { alert('Error: ' + e.message); }
    }

    async function cancelWorkflow(id) {
      if (!confirm('Cancel this workflow and all its pending jobs?')) return;
      try {
        await apiFetch(`/api/workflows/${id}`, { method: 'DELETE' });
        await refresh();
      } catch (e) { alert('Error: ' + e.message); }
    }

    async function showJobDetail(id) {
      try {
        const j = await apiFetch(`/api/jobs/${id}`);
        document.getElementById('job-detail-content').innerHTML = `
          <div class="grid grid-cols-2 gap-x-6 gap-y-2.5">
            ${row('Name',       `<span class="text-gray-200">${esc(j.name)}</span>`)}
            ${row('ID',         `<span class="text-gray-300 break-all font-mono">${esc(j.id)}</span>`)}
            ${row('Status',     statusBadge(j.status))}
            ${row('Priority',   priorityBadge(j.priority))}
            ${row('Retries',    `<span class="text-gray-300">${j.retry_count} / ${j.max_retries}</span>`)}
            ${row('Worker',     `<span class="text-gray-300 break-all">${esc(j.worker_id || '—')}</span>`)}
            ${row('Workflow',   j.workflow_id
              ? `<button class="text-blue-400 hover:underline" onclick="closeModal('job-detail-modal');showWorkflowDetail('${j.workflow_id}')">${j.workflow_id.slice(0,8)}…</button>`
              : '<span class="text-gray-500">—</span>')}
            ${row('Created',    `<span class="text-gray-300">${fmtDate(j.created_at)}</span>`)}
            ${row('Updated',    `<span class="text-gray-300">${fmtDate(j.updated_at)}</span>`)}
          </div>
          ${j.error_msg ? `
            <div class="mt-3 p-3 bg-red-950 rounded border border-red-800">
              <span class="text-red-400 font-semibold">Error: </span>
              <span class="text-gray-300">${esc(j.error_msg)}</span>
            </div>` : ''}
          <div class="mt-3">
            <div class="text-gray-500 mb-1">Payload</div>
            <pre class="bg-gray-900 p-3 rounded text-green-300 overflow-auto max-h-40 text-xs leading-relaxed">${esc(j.payload || '(empty)')}</pre>
          </div>
        `;
        openModal('job-detail-modal');
      } catch (e) { alert('Error: ' + e.message); }
    }

    async function showWorkflowDetail(id) {
      try {
        const wf = await apiFetch(`/api/workflows/${id}`);
        const jobs = wf.jobs ?? [];
        const done = jobs.filter(j => j.status === 'COMPLETED').length;
        const failed = jobs.filter(j => ['FAILED','DEAD'].includes(j.status)).length;
        document.getElementById('workflow-detail-content').innerHTML = `
          <div class="grid grid-cols-2 gap-x-6 gap-y-2.5 mb-4">
            ${row('Name',    `<span class="text-gray-200">${esc(wf.name)}</span>`)}
            ${row('ID',      `<span class="text-gray-300 break-all font-mono">${esc(wf.id)}</span>`)}
            ${row('Status',  statusBadge(wf.status))}
            ${row('Created', `<span class="text-gray-300">${fmtDate(wf.created_at)}</span>`)}
            ${row('Progress',`<span class="text-gray-300">${done}/${jobs.length} completed${failed ? `, ${failed} failed` : ''}</span>`)}
          </div>
          <div class="text-gray-400 font-semibold mb-2 text-xs">Jobs (${jobs.length})</div>
          <div class="space-y-1">
            ${jobs.map(j => `
              <div class="flex items-center justify-between bg-gray-900 rounded px-3 py-2 gap-3">
                <span class="text-gray-200 font-medium truncate min-w-0">${esc(j.name)}</span>
                <div class="flex items-center gap-2 shrink-0 flex-wrap justify-end">
                  ${priorityBadge(j.priority)}
                  ${statusBadge(j.status)}
                  <span class="text-gray-500">${j.retry_count}/${j.max_retries}</span>
                  ${j.error_msg
                    ? `<span class="text-red-400 max-w-[160px] truncate text-xs" title="${esc(j.error_msg)}">⚠ ${esc(j.error_msg)}</span>`
                    : ''}
                </div>
              </div>`).join('')}
          </div>
        `;
        openModal('workflow-detail-modal');
      } catch (e) { alert('Error: ' + e.message); }
    }

    function row(label, value) {
      return `<div><span class="text-gray-500">${label}:</span> ${value}</div>`;
    }

    // ── Workflow DAG builder ──────────────────────────────────────────────────────

    let wfJobCounter = 0;

    function addWorkflowJob() {
      wfJobCounter++;
      const lid = `job-${wfJobCounter}`;
      const div = document.createElement('div');
      div.id = `wf-job-card-${lid}`;
      div.dataset.lid = lid;
      div.className = 'bg-gray-900 rounded-lg p-3 border border-gray-600';
      div.innerHTML = `
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-bold text-blue-400 font-mono">${lid}</span>
          <button type="button" class="text-xs text-gray-500 hover:text-red-400" onclick="removeWfJob('${lid}')">✕ Remove</button>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div class="col-span-2">
            <label class="field-label">Name *</label>
            <input class="field-input" data-field="name" type="text" required placeholder="step name" />
          </div>
          <div class="col-span-2">
            <label class="field-label">Payload (JSON)</label>
            <textarea class="field-input" data-field="payload" rows="2" placeholder='{}'></textarea>
          </div>
          <div>
            <label class="field-label">Priority</label>
            <select class="field-input" data-field="priority">
              <option value="0">0 — Critical</option>
              <option value="1">1 — High</option>
              <option value="2" selected>2 — Normal</option>
              <option value="3">3 — Background</option>
            </select>
          </div>
          <div>
            <label class="field-label">Max Retries</label>
            <input class="field-input" data-field="max_retries" type="number" min="0" max="10" value="3" />
          </div>
          <div class="col-span-2">
            <label class="field-label">Depends On</label>
            <div id="deps-${lid}" class="flex flex-wrap gap-2 min-h-[20px]">
              <span class="text-gray-600 text-xs italic">No other jobs yet</span>
            </div>
          </div>
        </div>
      `;
      document.getElementById('wf-jobs-list').appendChild(div);
      rebuildDepCheckboxes();
    }

    function removeWfJob(lid) {
      document.getElementById(`wf-job-card-${lid}`)?.remove();
      rebuildDepCheckboxes();
    }

    function rebuildDepCheckboxes() {
      const cards = Array.from(document.querySelectorAll('#wf-jobs-list > div[data-lid]'));
      const allLids = cards.map(c => c.dataset.lid);
      for (const card of cards) {
        const myLid = card.dataset.lid;
        const container = document.getElementById(`deps-${myLid}`);
        if (!container) continue;
        const checked = new Set(
          Array.from(container.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value)
        );
        const others = allLids.filter(l => l !== myLid);
        if (!others.length) {
          container.innerHTML = '<span class="text-gray-600 text-xs italic">No other jobs yet</span>';
          continue;
        }
        container.innerHTML = others.map(lid => `
          <label class="flex items-center gap-1.5 text-xs cursor-pointer select-none">
            <input type="checkbox" value="${lid}" ${checked.has(lid) ? 'checked' : ''} class="accent-blue-500 cursor-pointer" />
            <span class="text-gray-300 font-mono">${lid}</span>
          </label>
        `).join('');
      }
    }

    // ── Form: Submit Job ─────────────────────────────────────────────────────────

    document.getElementById('submit-job-form').addEventListener('submit', async e => {
      e.preventDefault();
      const f   = new FormData(e.target);
      const err = document.getElementById('submit-job-error');
      err.classList.add('hidden');
      try {
        await apiFetch('/api/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name:        f.get('name'),
            payload:     f.get('payload') || '',
            priority:    parseInt(f.get('priority')),
            max_retries: parseInt(f.get('max_retries')),
          }),
        });
        closeModal('submit-job-modal');
        e.target.reset();
        await refresh();
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
      }
    });

    // ── Form: Submit Workflow ────────────────────────────────────────────────────

    document.getElementById('submit-workflow-form').addEventListener('submit', async e => {
      e.preventDefault();
      const err    = document.getElementById('submit-workflow-error');
      err.classList.add('hidden');
      const wfName = document.querySelector('[name=workflow_name]').value.trim();
      if (!wfName) { err.textContent = 'Workflow name is required'; err.classList.remove('hidden'); return; }

      const cards = Array.from(document.querySelectorAll('#wf-jobs-list > div[data-lid]'));
      if (!cards.length) { err.textContent = 'Add at least one job'; err.classList.remove('hidden'); return; }

      const jobs = cards.map(card => {
        const lid = card.dataset.lid;
        const depEls = Array.from(card.querySelectorAll(`#deps-${lid} input[type=checkbox]:checked`));
        return {
          id:          lid,
          name:        card.querySelector('[data-field=name]').value.trim(),
          payload:     card.querySelector('[data-field=payload]').value || '',
          priority:    parseInt(card.querySelector('[data-field=priority]').value),
          max_retries: parseInt(card.querySelector('[data-field=max_retries]').value),
          depends_on:  depEls.map(cb => cb.value),
        };
      });

      for (const j of jobs) {
        if (!j.name) { err.textContent = `"${j.id}" needs a name`; err.classList.remove('hidden'); return; }
      }

      try {
        await apiFetch('/api/workflows', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: wfName, jobs }),
        });
        closeModal('submit-workflow-modal');
        document.getElementById('submit-workflow-form').reset();
        document.getElementById('wf-jobs-list').innerHTML = '';
        wfJobCounter = 0;
        await refresh();
      } catch (ex) {
        err.textContent = ex.message;
        err.classList.remove('hidden');
      }
    });

    // ── Tabs ─────────────────────────────────────────────────────────────────────

    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.getElementById(`panel-${btn.dataset.tab}`).classList.remove('hidden');
    }));

    // ── Modals ────────────────────────────────────────────────────────────────────

    function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    document.querySelectorAll('.modal-close').forEach(btn =>
      btn.addEventListener('click', () => closeModal(btn.dataset.modal))
    );
    document.querySelectorAll('.modal-overlay').forEach(overlay =>
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(overlay.id); })
    );

    document.getElementById('open-submit-job').addEventListener('click', () => openModal('submit-job-modal'));

    document.getElementById('open-submit-workflow').addEventListener('click', () => {
      wfJobCounter = 0;
      document.getElementById('wf-jobs-list').innerHTML = '';
      document.querySelector('[name=workflow_name]').value = '';
      openModal('submit-workflow-modal');
      addWorkflowJob();
    });

    document.getElementById('add-wf-job').addEventListener('click', addWorkflowJob);

    document.getElementById('job-status-filter').addEventListener('change', async e => {
      state.jobFilter = e.target.value;
      await refresh();
    });

    // ── Auto-refresh ──────────────────────────────────────────────────────────────

    let cd = 5;
    let busy = false;

    async function refresh() {
      if (busy) return;
      busy = true;
      try {
        await fetchAll();
        renderAll();
        cd = 5;
      } catch (e) {
        console.error('refresh failed', e);
        const hb = document.getElementById('health-badge');
        hb.textContent = 'unreachable';
        hb.className   = 'badge bg-red-900 text-red-300';
      }
      busy = false;
    }

    document.getElementById('refresh-now').addEventListener('click', () => refresh());

    setInterval(() => {
      cd--;
      document.getElementById('countdown').textContent = Math.max(cd, 0);
      if (cd <= 0) { cd = 5; refresh(); }
    }, 1000);

    refresh();
  </script>
</body>
</html>
