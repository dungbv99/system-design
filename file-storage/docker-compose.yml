version: '3.9'

services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: filestorage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Java service ──────────────────────────────────────────────────────────
  # Build context is the repo root so the Dockerfile can access the parent pom.xml.

  file-storage:
    build:
      context: ..
      dockerfile: file-storage/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/filestorage
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    volumes:
      - blocks_data:/app/blocks

  # ── Go service ────────────────────────────────────────────────────────────

  sync-gateway:
    build:
      context: sync-gateway
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      PORT: "8081"
      JWT_SECRET: "filestoragesystem-super-secret-key-must-be-at-least-256-bits-long-for-hs256"

volumes:
  postgres_data:
  blocks_data:
