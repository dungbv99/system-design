spring:
  application:
    name: file-storage-system

  datasource:
    url: jdbc:postgresql://localhost:5432/filestorage
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 512MB
      max-request-size: 512MB

server:
  port: 8080
  compression:
    enabled: true

app:
  jwt:
    secret: "filestoragesystem-super-secret-key-must-be-at-least-256-bits-long-for-hs256"
    expiration-ms: 86400000        # 24 hours

  storage:
    blocks-path: ./blocks          # local filesystem block store

  upload:
    max-block-size: 8388608        # 8 MB
    min-block-size: 524288         # 512 KB
    session-expiry-hours: 24
    max-versions-per-file: 100

logging:
  level:
    org.example: DEBUG
    org.springframework.security: WARN
    org.flywaydb: INFO
