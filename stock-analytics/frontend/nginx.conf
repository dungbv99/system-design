server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    location /api/ {
        proxy_pass         http://crawler:8090;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri /index.html;
    }
}
