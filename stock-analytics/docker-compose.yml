services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  crawler:
    build: ./crawler
    ports:
      - "8090:8090"
    environment:
      DB_DSN: postgresql://postgres:postgres@postgres:5432/stock
      CRAWL_HOUR: "8"        # UTC hour — 08:00 UTC = 15:00 ICT (30 min after close)
      CRAWL_MINUTE: "0"
      RATE_LIMIT_MS: "100"   # delay between per-symbol API calls
      WORKERS: "5"           # concurrent symbol fetches
      RUN_NOW: "0"           # set to "1" to trigger an immediate crawl on startup
      API_PORT: "8090"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    depends_on:
      - crawler

volumes:
  pg_data:
