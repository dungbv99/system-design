services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock
    volumes:
      # First-init hook: restore from stock_dump.sql.gz if present, else apply
      # init.sql (schema only). Runs once, only when pg_data is empty.
      - ./db/restore.sh:/docker-entrypoint-initdb.d/00-restore.sh:ro
      - ./db/init.sql:/seed/init.sql:ro
      - ./stock_dump.sql.gz:/seed/stock_dump.sql.gz:ro
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  crawler:
    build: ./crawler
    ports:
      - "8090:8090"
    volumes:
      - ./scripts:/app/scripts:ro     # Wyckoff-Optimized backtest helper scripts
      - ./output:/app/output          # backtest result files (json/log/md) + optimized_params.json
    environment:
      DB_DSN: postgresql://postgres:postgres@postgres:5432/stock
      CRAWL_HOUR: "8"        # UTC hour — 08:00 UTC = 15:00 ICT (30 min after close)
      CRAWL_MINUTE: "0"
      RATE_LIMIT_MS: "100"   # delay between per-symbol API calls
      WORKERS: "5"           # concurrent symbol fetches
      RUN_NOW: "0"           # set to "1" to trigger an immediate crawl on startup
      API_PORT: "8090"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"            # for quarterly-report analysis (aistudio.google.com)
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"      # for quarterly-report analysis with Claude (console.anthropic.com)
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-opus-4-8}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:3001"
    depends_on:
      - crawler

volumes:
  pg_data:
